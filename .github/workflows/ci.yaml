name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Oodle DLL
        env:
          PYTHONWARNINGS: ignore::RuntimeWarning
        run: |
          python -m src.cli.main install

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  build-release:
    if: github.event_name == 'release'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create lib directory
        run: mkdir lib -Force

      - name: Download Oodle DLL
        run: |
          curl -L -o lib/oo2core_9_win64.dll "https://github.com/Yukidaruma56/oo2core_9_win64.dll/raw/refs/heads/main/oo2core_9_win64.dll"

      - name: Download vgmstream
        run: |
          curl -L -o vgmstream.zip "https://github.com/vgmstream/vgmstream/releases/latest/download/vgmstream-win64.zip"
          tar -xf vgmstream.zip -C lib/ --wildcards "*/vgmstream-cli.exe" --strip-components 1

      - name: Download ffmpeg
        run: |
          curl -L -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip"
          tar -xf ffmpeg.zip -C lib/ --wildcards "*/bin/ffmpeg.exe" --strip-components 2

      - name: Create portable archive
        run: |
          $archive = "marathon-pkg-extractor-${{ github.ref_name }}-portable.zip"
          Compress-Archive -Path ".\src", ".\lib", ".\_venv.bat", ".\run.bat", ".\extract.bat", ".\convert.bat", ".\download.bat", ".\help.bat", ".\pyproject.toml", ".\LICENSE", ".\README.md" -DestinationPath $archive

      - name: Upload release artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./marathon-pkg-extractor-*.zip
          asset_name: marathon-pkg-extractor-${{ github.ref_name }}-portable.zip
          asset_content_type: application/zip
